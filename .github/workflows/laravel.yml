name: Laravel CI/CD MySQL Tests

on: [push, pull_request]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, mysql, dom, curl
          coverage: none

      - name: 📦 Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: ⚙️ Prepare Environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing

      - name: 🗄️ Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: 🧪 Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --without-tty

  # NOUVEAU JOB : Build de l'image Docker et Push sur Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Remplacez "facturation" par le nom de dépôt Docker Hub souhaité
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/facturation:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/facturation:${{ github.sha }}

  # DEPLOIEMENT : Le serveur self-hosted récupère la nouvelle image Docker
  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: 🚀 Déploiement du conteneur sur le serveur
        run: |
          cd /home/fraduis/gpi
          
          # Se connecter à Docker hub depuis le serveur (si privé)
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Récupérer la dernière version de l'image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/facturation:latest
          
          # Relancer le conteneur (Exemple si vous utilisez docker-compose sur votre serveur)
          docker compose up -d --no-deps facturation
          
          # Exécuter les migrations à l'intérieur du conteneur tout juste mis à jour
          docker compose exec -T facturation php artisan migrate --force
          docker compose exec -T facturation php artisan optimize