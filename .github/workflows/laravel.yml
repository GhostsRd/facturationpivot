name: Laravel CI/CD MySQL Tests

on: [push, pull_request]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, mysql, dom, curl
          coverage: none

      - name: 📦 Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: ⚙️ Prepare Environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing

      - name: 🗄️ Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: 🧪 Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --without-tty

# NOUVEAU JOB : Build de l'image Docker et Push sur Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/facturation:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/facturation:${{ github.sha }}

  # DEPLOIEMENT AUTOMATISÉ CORRIGÉ
  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: 🚀 Déploiement du conteneur sur le serveur
        run: |
          # 1. On se place impérativement dans le dossier contenant le docker-compose.yml
          cd /home/fraduis/gpi
          
          # 2. Connexion sécurisée à Docker Hub depuis le serveur
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # 3. Récupération de l'image fraîchement buildée par GitHub
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/facturation:latest
          
          # 4. Relance du service (recherche le fichier docker-compose.yml ici)
          sudo docker compose up -d --no-deps facturation
          
          # 5. Exécution des commandes internes à Laravel
          sudo docker compose exec -T facturation php artisan migrate --force
          sudo docker compose exec -T facturation php artisan optimize